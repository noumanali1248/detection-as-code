name: Detection-as-Code Validation Pipeline

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Sigma CLI and Elasticsearch Backend
        run: |
          python -m pip install --upgrade pip
          pip install sigma-cli pyyaml
          sigma plugin install elasticsearch

      - name: YAML Syntax Check
        run: |
          python - <<'PY'
          import glob, sys, yaml
          files = glob.glob('sigma_rules/*.yml')
          if not files:
              print("No .yml files found")
              sys.exit(1)
          failed = False
          for f in files:
              try:
                  with open(f) as fp:
                      yaml.safe_load(fp)
                  print(f'✅ VALID YAML: {f}')
              except Exception as e:
                  print(f'❌ INVALID YAML: {f}\n{e}')
                  failed = True
          sys.exit(1 if failed else 0)
          PY

      - name: Sigma Rule Validation
        run: |
          for file in sigma_rules/*.yml; do
            sigma check "$file" || exit 1
          done

      - name: Custom Rule Structure Validation
        run: |
          python - <<'PY'
          import glob, sys, yaml
          REQUIRED = ['title', 'id', 'description', 'logsource', 'detection']
          files = glob.glob('sigma_rules/*.yml')
          failed = False
          for f in files:
              data = yaml.safe_load(open(f))
              for field in REQUIRED:
                  if field not in data:
                      print(f'❌ Missing {field} in {f}')
                      failed = True
              if 'detection' in data and 'condition' not in data['detection']:
                  print(f'❌ Missing detection.condition in {f}')
                  failed = True
          sys.exit(1 if failed else 0)
          PY

      - name: Convert Sigma to ELK (Elasticsearch)
        run: |
          mkdir -p build/elk
          for rule in sigma_rules/*.yml; do
            base=$(basename "$rule" .yml)
            sigma convert -t elasticsearch --without-pipeline "$rule" > "build/elk/${base}.json"
            if [ $? -ne 0 ]; then
              echo "❌ ELK conversion failed for $rule"
              exit 1
            fi
          done

      - name: Convert Sigma to Wazuh XML (Custom Converter)
        run: |
          mkdir -p build/wazuh
          python - <<'PY'
          import os, sys, yaml, glob, xml.etree.ElementTree as ET

          def sigma_to_wazuh_rule(sigma_data, rule_name):
              # Minimal mapping: create Wazuh rule XML
              root = ET.Element("rule", id=str(sigma_data.get('id', '1001')), level="10")
              title = sigma_data.get('title', '')
              desc = sigma_data.get('description', '')
              if 'logsource' in sigma_data and 'product' in sigma_data['logsource']:
                  product = sigma_data['logsource']['product']
                  ET.SubElement(root, "if_sid").text = "5710"  # generic parent
              if 'detection' in sigma_data:
                  # simplified: use description as match string
                  ET.SubElement(root, "match").text = title[:50]
              ET.SubElement(root, "description").text = desc
              return ET.tostring(root, encoding='unicode')

          failed = False
          for f in glob.glob('sigma_rules/*.yml'):
              with open(f) as fp:
                  data = yaml.safe_load(fp)
              basename = os.path.basename(f).replace('.yml', '.xml')
              outpath = os.path.join('build/wazuh', basename)
              try:
                  xml_output = sigma_to_wazuh_rule(data, basename)
                  with open(outpath, 'w') as out:
                      out.write(xml_output)
                  print(f'✅ Converted {f} -> {outpath}')
              except Exception as e:
                  print(f'❌ Conversion failed for {f}: {e}')
                  failed = True
          sys.exit(1 if failed else 0)
          PY

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: detection-rules-converted
          path: build/